<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,maximum-scale=1.0,user-scalable=no" />
<title>Ferrari Nitro Edition</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
html, body { margin:0; overflow:hidden; height:100%; background:#000; }
canvas { display:block; }

/* --- Control Layout --- */
.controls {
  position: fixed; bottom: 5vh; width: 100%;
  display: flex; justify-content: space-between; padding: 0 6vw;
  z-index: 10;
}
.left-controls, .right-controls {
  display: flex; flex-direction: column; gap: 4vh;
}
button {
  width: 12vw; height: 12vw; max-width: 90px; max-height: 90px;
  border: none; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: white; font-size: 4.5vw;
  backdrop-filter: blur(8px);
  user-select: none; touch-action: manipulation;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}
button:active { background: rgba(0,255,0,0.4); }

/* Booster Button — above accel/reverse */
#booster {
  position: fixed;
  right: 10vw;
  bottom: 32vh;
  width: 12vw; height: 12vw; max-width: 90px; max-height: 90px;
  border-radius: 50%;
  background: rgba(255,215,0,0.3);
  font-size: 5vw;
  box-shadow: 0 0 20px rgba(255,255,0,0.4);
  z-index: 11;
}

/* Speedometer */
#speedHUD {
  position: fixed; right: 2vw; bottom: 3vh;
  color: white; font-family: monospace;
  text-align: right; z-index: 20;
}
#speedValue {
  font-size: 5vw;
  right: 7px;
  font-weight: bold;
  text-shadow: 0 0 10px #00ffcc;
}

/* Win Screen */
#winScreen {
  position: fixed; inset: 0;
  display: none; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.85);
  color: white; font-size: 48px; font-weight: bold; z-index: 30;
  text-shadow: 0 0 10px #ff0;
}
</style>
</head>
<body>
<div class="controls">
  <div class="left-controls">
    <button id="left"><i class="fa-solid fa-arrow-left"></i></button>
    <button id="right"><i class="fa-solid fa-arrow-right"></i></button>
  </div>
  <div class="right-controls">
    <button id="accelerate"><i class="fa-solid fa-arrow-up"></i></button>
    <button id="reverse"><i class="fa-solid fa-arrow-down"></i></button>
  </div>
</div>
<button id="booster"><i class="fa-solid fa-bolt"></i></button>

<div id="speedHUD">
  <div>SPEED</div>
  <div id="speedValue">0 km/h</div>
</div>
<div id="winScreen">🏁 YOU WIN! 🏁</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xa0a0a0, 50, 350);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,6,-10);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff3e0, 1.2);
sun.position.set(100,200,100);
sun.castShadow = true;
scene.add(sun);

// Sky and track
const sky = new THREE.Mesh(
  new THREE.SphereGeometry(500,32,32),
  new THREE.MeshBasicMaterial({ color:0x87ceeb, side:THREE.BackSide })
);
scene.add(sky);

const trackTex = new THREE.TextureLoader().load("track.jpg");
trackTex.wrapS = trackTex.wrapT = THREE.RepeatWrapping;
trackTex.repeat.set(20,200);
const track = new THREE.Mesh(
  new THREE.PlaneGeometry(40,800),
  new THREE.MeshStandardMaterial({ map:trackTex, roughness:0.6 })
);
track.rotation.x = -Math.PI/2;
track.receiveShadow = true;
scene.add(track);

// Finish line
const finishTex = new THREE.TextureLoader().load("https://i.imgur.com/L4nHqEj.png");
const finish = new THREE.Mesh(new THREE.PlaneGeometry(40,10),
  new THREE.MeshBasicMaterial({ map: finishTex, transparent:true }));
finish.rotation.x = -Math.PI/2;
finish.position.z = -380;
scene.add(finish);

// Car
const car = new THREE.Group();
car.position.set(0,1,350);
const body = new THREE.Mesh(
  new THREE.BoxGeometry(2,0.6,4),
  new THREE.MeshPhysicalMaterial({ color:0xff0000, metalness:0.9, roughness:0.3, clearcoat:1 })
);
body.castShadow = true; car.add(body);

const wheelMat = new THREE.MeshStandardMaterial({ color:0x111111 });
function wheel(x,z){
  const w = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,0.3,20), wheelMat);
  w.rotation.z = Math.PI/2; w.position.set(x,-0.3,z); w.castShadow = true; car.add(w);
}
wheel(-0.9,1.5); wheel(0.9,1.5); wheel(-0.9,-1.5); wheel(0.9,-1.5);
scene.add(car);

// Booster light
const boosterLight = new THREE.PointLight(0x00ffff, 0, 20);
boosterLight.position.set(0,0,-2);
car.add(boosterLight);

// Movement
let vel = 0;
const input = { accel:false, reverse:false, left:false, right:false };
let boosterReady = true;
let boosterActive = false;
let boostTimer = 0;
const accelRate = 0.12, damping = 0.97, turnSpeed = 0.04, maxSpeed=4.5;

function bind(id,key){
  const el=document.getElementById(id);
  el.addEventListener("touchstart",()=>input[key]=true);
  el.addEventListener("touchend",()=>input[key]=false);
  el.addEventListener("mousedown",()=>input[key]=true);
  el.addEventListener("mouseup",()=>input[key]=false);
}
bind("accelerate","accel");
bind("reverse","reverse");
bind("left","left");
bind("right","right");

document.getElementById("booster").addEventListener("click",()=>{
  if(boosterReady){
    boosterActive=true;
    boosterReady=false;
    boostTimer=50; // ~1 second
    boosterLight.intensity=2;
    const btn=document.getElementById("booster");
    btn.style.opacity="0.5";
    setTimeout(()=>{ boosterReady=true; btn.style.opacity="1"; },30000);
  }
});

window.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp")input.accel=true;
  if(e.key==="ArrowDown")input.reverse=true;
  if(e.key==="ArrowLeft")input.left=true;
  if(e.key==="ArrowRight")input.right=true;
});
window.addEventListener("keyup",(e)=>{
  if(e.key==="ArrowUp")input.accel=false;
  if(e.key==="ArrowDown")input.reverse=false;
  if(e.key==="ArrowLeft")input.left=false;
  if(e.key==="ArrowRight")input.right=false;
});

function animate(){
  requestAnimationFrame(animate);

  if(input.accel) vel += accelRate;
  if(input.reverse) vel -= accelRate * 0.6;

  if(Math.abs(vel)>0.05){
    if(input.left) car.rotation.y += turnSpeed;
    if(input.right) car.rotation.y -= turnSpeed;
  }

  if(boosterActive){
    vel += (vel<0? -0.25: 0.25);
    boostTimer--;
    if(boostTimer<=0){ boosterActive=false; boosterLight.intensity=0; }
  }

  vel = Math.max(Math.min(vel, maxSpeed), -maxSpeed);
  vel *= damping;

  car.position.x -= Math.sin(car.rotation.y)*vel;
  car.position.z -= Math.cos(car.rotation.y)*vel;

  // Camera follow
  const camOffset = new THREE.Vector3(0,6,12).applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y);
  camera.position.lerp(car.position.clone().add(camOffset), 0.1);
  camera.lookAt(car.position);

  // Speedometer
  const speedKmh = Math.abs(vel)*60;
  document.getElementById("speedValue").textContent = `${speedKmh.toFixed(0)} km/h`;

  if(car.position.z < -380) document.getElementById("winScreen").style.display="flex";
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
